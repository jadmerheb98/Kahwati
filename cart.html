<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kahwati Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell simple-page">
    <header class="page-header safe-x"><a class="back" href="menu.html">‹</a><h1>Cart</h1><p>Choose delivery or takeaway.</p></header>
    <section class="safe-x cart-options">
      <button class="active">Delivery</button><button>Takeaway</button><button>Cash</button><button>Online</button>
    </section>
    <section class="menu-list safe-x">
      <article class="menu-item"><div class="menu-img">☕</div><div><h4>Iced Spanish Latte</h4><p>Qty 1</p></div><strong>$4.50</strong></article>
      <article class="menu-item"><div class="menu-img">🥐</div><div><h4>Almond Croissant</h4><p>Qty 1</p></div><strong>$3.25</strong></article>
    </section>
    <section class="total-card safe-x"><p>Subtotal <span>$7.75</span></p><p>Delivery <span>$1.00</span></p><h3>Total <span>$8.75</span></h3></section>
    <button class="place-order safe-x">Place order</button>
  </main>
</body>
</html>
